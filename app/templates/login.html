{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto pt-16 md:pt-24">
  <div class="reveal reveal-1 text-[0.72rem] tracking-[0.25em] uppercase text-rust-600 font-mono mb-6 text-center">
    {{ _('login.kicker') }}
  </div>

  <h1 class="reveal reveal-2 font-serif text-4xl md:text-5xl text-ink-900 tracking-tight-display leading-[1.05] text-center mb-4">
    {{ _('login.title') }}
  </h1>

  <p class="reveal reveal-2 text-ink-500 text-center mb-10 leading-relaxed">
    {{ _('login.lead_1') }} <span class="font-serif italic">{{ _('login.lead_em') }}</span>{{ _('login.lead_2') }}
  </p>

  {% if error %}
    <div class="reveal reveal-3 mb-6 p-4 rounded-xl bg-rust-50 text-rust-700 text-sm leading-relaxed border-l-2 border-rust-500">
      <span class="font-serif italic">⚠ </span>{{ error }}
    </div>
  {% endif %}

  <form method="post" action="/auth/request" class="reveal reveal-3 surface p-8 space-y-5">
    <div>
      <label for="email" class="block text-[0.78rem] tracking-[0.15em] uppercase text-ink-500 font-mono mb-3">
        {{ _('login.email_label') }}
      </label>
      <input type="email" id="email" name="email" required autofocus
             placeholder="{{ _('login.email_placeholder') }}">
    </div>
    <button type="submit" class="btn-primary w-full justify-center">
      {{ _('login.submit') }}
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12m-4-4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>

  <p class="reveal reveal-4 text-center mt-8 text-sm text-ink-400 italic font-serif">
    {{ _('login.new_here') }}
  </p>
</div>

{% endblock %}
