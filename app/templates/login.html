{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-2">Login</h1>
  <p class="text-slate-600 mb-6">Wir schicken dir einen Login-Link per Email. 15 Minuten gültig.</p>

  {% if error %}
    <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-red-800 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/request" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1" for="email">Email-Adresse</label>
      <input type="email" id="email" name="email" required autofocus
             class="w-full rounded-md border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900">
    </div>
    <button type="submit" class="w-full py-2 rounded-md bg-slate-900 text-white font-medium hover:bg-slate-700">
      Link senden
    </button>
  </form>
</div>
{% endblock %}
