<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notion → Calendar{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: {
              50:  '#faf9f5',
              100: '#f5f4ed',
              200: '#eae5db',
              300: '#ddd6c8',
              400: '#c4bba9',
            },
            ink: {
              900: '#1a1613',
              800: '#2a241f',
              700: '#3d3631',
              600: '#524940',
              500: '#6b635a',
              400: '#8a8178',
              300: '#aea59a',
            },
            rust: {
              50:  '#faf0eb',
              100: '#f5e4d9',
              200: '#ead0bd',
              300: '#dcae8f',
              400: '#ca8865',
              500: '#bd5d3a',
              600: '#a54e30',
              700: '#8a3f26',
              800: '#6b301e',
            },
          },
          fontFamily: {
            serif: ['Fraunces', 'Georgia', 'serif'],
            sans:  ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
            mono:  ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          },
          letterSpacing: {
            'tight-display': '-0.02em',
          },
          boxShadow: {
            'paper': '0 1px 2px rgba(26,22,19,0.04), 0 8px 32px -8px rgba(26,22,19,0.06)',
            'lift': '0 2px 4px rgba(26,22,19,0.04), 0 16px 48px -12px rgba(26,22,19,0.12)',
            'inset-hairline': 'inset 0 0 0 1px rgba(26,22,19,0.06)',
          },
        }
      }
    }
  </script>

  <style>
    html { background-color: #faf9f5; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-feature-settings: "ss02", "cv11";
      color: #1a1613;
      background-color: #faf9f5;
      background-image:
        radial-gradient(ellipse 1200px 600px at 85% -10%, rgba(189,93,58,0.05), transparent 60%),
        radial-gradient(ellipse 800px 500px at 10% 110%, rgba(189,93,58,0.04), transparent 60%);
      background-attachment: fixed;
    }
    h1, h2, h3, h4, .font-serif {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "opsz" 144, "SOFT" 30;
      letter-spacing: -0.02em;
    }
    .serif-tight { font-variation-settings: "opsz" 72, "SOFT" 20; }
    .serif-soft  { font-variation-settings: "opsz" 144, "SOFT" 100; }

    .link-underline {
      position: relative;
      display: inline;
    }
    .link-underline::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -2px;
      height: 1px;
      background: currentColor;
      opacity: 0.35;
      transform-origin: right;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
    }
    .link-underline:hover::after { opacity: 1; }

    .btn-primary {
      background: #bd5d3a;
      color: #faf9f5;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 1px 2px rgba(189,93,58,0.24), 0 8px 24px -8px rgba(189,93,58,0.4);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary:hover {
      background: #a54e30;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(189,93,58,0.3), 0 12px 32px -8px rgba(189,93,58,0.5);
    }
    .btn-ghost {
      color: #3d3631;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .btn-ghost:hover { background-color: rgba(26,22,19,0.04); }

    .surface {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 1px 2px rgba(26,22,19,0.04), 0 8px 32px -8px rgba(26,22,19,0.06);
    }
    .surface-raised {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 2px 4px rgba(26,22,19,0.04), 0 16px 48px -12px rgba(26,22,19,0.1);
    }
    .hairline { border-top: 1px solid rgba(26,22,19,0.08); }

    input[type="email"], input[type="text"], select, textarea {
      font-family: inherit;
      background: #faf9f5;
      border: 1px solid rgba(26,22,19,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #1a1613;
      transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #bd5d3a;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(189,93,58,0.15);
    }

    ::selection { background: rgba(189,93,58,0.2); color: #1a1613; }

    /* delightful reveal */
    .reveal { opacity: 0; transform: translateY(8px); animation: reveal 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    .reveal-1 { animation-delay: 0.05s; }
    .reveal-2 { animation-delay: 0.18s; }
    .reveal-3 { animation-delay: 0.32s; }
    .reveal-4 { animation-delay: 0.5s; }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen antialiased">

  <header class="max-w-5xl mx-auto px-6 md:px-8 py-6">
    <div class="flex items-baseline justify-between">
      <a href="/" class="group inline-flex items-baseline gap-2">
        <span class="font-serif text-[1.35rem] text-ink-900 tracking-tight-display serif-tight">
          Notion <span class="text-rust-500">→</span> Calendar
        </span>
      </a>
      <nav class="flex items-center gap-1 text-[0.92rem]">
        {% if user %}
          <span class="hidden sm:inline text-ink-400 mr-3 font-mono text-xs">{{ user.email }}</span>
          <a href="/dashboard" class="btn-ghost">Dashboard</a>
          <form method="post" action="/auth/logout" class="inline">
            <button class="btn-ghost text-ink-500">Logout</button>
          </form>
        {% else %}
          <a href="/login" class="btn-ghost">Einloggen</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 md:px-8 pb-20">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-5xl mx-auto px-6 md:px-8 py-10">
    <div class="hairline pt-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 text-sm text-ink-500">
      <div class="font-serif italic serif-soft">
        Made with care · <span class="not-italic font-sans">{{ base_url|replace('https://', '')|replace('http://', '') }}</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="/imprint" class="link-underline hover:text-ink-900">Impressum</a>
        <a href="/privacy" class="link-underline hover:text-ink-900">Datenschutz</a>
      </div>
    </div>
  </footer>

</body>
</html>
