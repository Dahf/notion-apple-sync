<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notion Calendar Sync{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
  <style>
    [x-cloak] { display: none !important; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-slate-900">📅 Notion → Calendar</a>
      <nav class="flex items-center gap-4 text-sm">
        {% if user %}
          <span class="text-slate-500">{{ user.email }}</span>
          <a href="/dashboard" class="text-slate-700 hover:text-slate-900">Dashboard</a>
          <form method="post" action="/auth/logout" class="inline">
            <button class="text-slate-500 hover:text-red-600">Logout</button>
          </form>
        {% else %}
          <a href="/login" class="text-slate-700 hover:text-slate-900">Login</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-slate-200 bg-white">
    <div class="max-w-4xl mx-auto px-4 py-4 text-xs text-slate-500 flex gap-4">
      <a href="/imprint" class="hover:text-slate-900">Impressum</a>
      <a href="/privacy" class="hover:text-slate-900">Datenschutz</a>
    </div>
  </footer>
</body>
</html>
