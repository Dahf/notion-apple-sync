{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto text-center">
  <div class="text-5xl mb-4">📬</div>
  <h1 class="text-2xl font-bold mb-2">Check deine Mails</h1>
  <p class="text-slate-600">
    Falls <span class="mono">{{ email }}</span> registriert ist oder wir dich anlegen können,
    haben wir dir gerade einen Login-Link geschickt. Der Link ist 15 Minuten gültig.
  </p>
  <p class="text-slate-500 text-sm mt-6">
    Nichts bekommen? Prüfe den Spam-Ordner oder <a href="/login" class="underline">versuch es erneut</a>.
  </p>
</div>
{% endblock %}
