services:
  notion-apple-sync:
    build: .
    container_name: notion-apple-sync
    restart: unless-stopped
    environment:
      NOTION_OAUTH_CLIENT_ID: ${NOTION_OAUTH_CLIENT_ID}
      NOTION_OAUTH_CLIENT_SECRET: ${NOTION_OAUTH_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-https://calendar.silasbeckmann.de/oauth/callback}
      FERNET_KEY: ${FERNET_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM:-Notion Calendar <noreply@calendar.silasbeckmann.de>}
      BASE_URL: ${BASE_URL:-https://calendar.silasbeckmann.de}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/config/app.db}
      CACHE_TTL: ${CACHE_TTL:-600}
      IMPRINT_NAME: ${IMPRINT_NAME}
      IMPRINT_ADDRESS: ${IMPRINT_ADDRESS}
      IMPRINT_EMAIL: ${IMPRINT_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
    volumes:
      - ./config:/app/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.calendar.entrypoints=web,websecure
      - traefik.http.services.calendar.loadbalancer.server.port=8080
      - traefik.http.routers.calendar.rule=Host(`calendar.silasbeckmann.de`)
      - traefik.http.routers.calendar.tls=true
      - traefik.docker.network=traefik_proxy-net
      - traefik.http.middlewares.calendar.headers.SSLRedirect=true
      - traefik.http.middlewares.calendar.headers.STSSeconds=315360000
      - traefik.http.middlewares.calendar.headers.browserXSSFilter=true
      - traefik.http.middlewares.calendar.headers.contentTypeNosniff=true
      - traefik.http.middlewares.calendar.headers.forceSTSHeader=true
      - traefik.http.middlewares.calendar.headers.SSLHost=${DOMAIN_NAME:-calendar.silasbeckmann.de}
      - traefik.http.middlewares.calendar.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.calendar.headers.STSPreload=true
      - traefik.http.routers.calendar.middlewares=calendar@docker
    networks:
      - traefik_proxy-net

networks:
  traefik_proxy-net:
    external: true